services:
  postgres:
    container_name: telemed_postgres
    image: postgres:17-alpine
    env_file:
      - ./backend/.env.postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - telemed_network

  backend:
    container_name: telemed_backend
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - telemed_network

  frontend:
    container_name: telemed_frontend
    build:
      context: ./frontend
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - telemed_network

  nginx:
    container_name: telemed_nginx.local
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./local.nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - telemed_network

volumes:
  postgres_data:

networks:
  telemed_network:
    driver: bridge
