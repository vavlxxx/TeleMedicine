default_language_version:
  python: python3.11.9

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: backend-ruff-check
        name: backend-ruff-check
        entry: poetry
        args: ["-C", "backend", "run", "python", "-m", "ruff", "check", "src", "tests", "--fix"]
        language: system
        pass_filenames: false
        files: ^backend/
        stages: [pre-commit]

      - id: backend-ruff-format
        name: backend-ruff-format
        entry: poetry
        args: ["-C", "backend", "run", "python", "-m", "ruff", "format", "src", "tests"]
        language: system
        pass_filenames: false
        files: ^backend/
        stages: [pre-commit]

      - id: backend-pyright
        name: backend-pyright
        entry: poetry
        args: ["-C", "backend", "run", "python", "-m", "pyright"]
        language: system
        pass_filenames: false
        files: ^backend/
        stages: [pre-commit]

      - id: backend-pytest
        name: backend-pytest
        entry: poetry
        args: ["-C", "backend", "run", "python", "-m", "pytest", "-v"]
        language: system
        pass_filenames: false
        files: ^backend/
        stages: [pre-push]

      - id: frontend-lint
        name: frontend-lint
        entry: npm
        args: ["--prefix", "frontend", "run", "lint"]
        language: system
        pass_filenames: false
        files: ^frontend/
        stages: [pre-commit]

      - id: frontend-smoke
        name: frontend-smoke
        entry: npm
        args: ["--prefix", "frontend", "run", "test:smoke"]
        language: system
        pass_filenames: false
        files: ^frontend/
        stages: [pre-push]
